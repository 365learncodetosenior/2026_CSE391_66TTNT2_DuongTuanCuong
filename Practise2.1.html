<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Validation</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --error-color: #e74c3c;
            --success-color: #2ecc71;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        input.invalid {
            border-color: var(--error-color);
            background-color: #fffcfc;
        }

        .error-text {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 5px;
            height: 18px; /* Giữ chỗ để tránh nhảy layout khi hiện lỗi */
            display: block;
        }

        .gender-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .terms-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #357abd;
        }

        #successBox {
            display: none;
            text-align: center;
            padding: 40px;
        }

        #successBox h1 {
            color: var(--success-color);
        }

        .badge-success {
            font-size: 50px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container" id="formWrapper">
        <h2>Đăng Ký Hệ Thống</h2>
        <form id="regForm" novalidate>
            <div class="form-group">
                <label for="fullname">Họ và tên</label>
                <input type="text" id="fullname" placeholder="Nhập ít nhất 3 ký tự...">
                <small id="fullnameError" class="error-text"></small>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="example@domain.com">
                <small id="emailError" class="error-text"></small>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="text" id="phone" placeholder="0xxxxxxxxx">
                <small id="phoneError" class="error-text"></small>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="8+ ký tự, 1 hoa, 1 thường, 1 số">
                <small id="passwordError" class="error-text"></small>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                <small id="confirmPasswordError" class="error-text"></small>
            </div>

            <div class="form-group">
                <label>Giới tính</label>
                <div class="gender-group">
                    <label style="font-weight: normal;"><input type="radio" name="gender" value="Nam"> Nam</label>
                    <label style="font-weight: normal;"><input type="radio" name="gender" value="Nữ"> Nữ</label>
                </div>
                <small id="genderError" class="error-text"></small>
            </div>

            <div class="form-group">
                <div class="terms-group">
                    <input type="checkbox" id="terms">
                    <label for="terms" style="font-weight: normal; margin: 0;">Tôi đồng ý với điều khoản dịch vụ</label>
                </div>
                <small id="termsError" class="error-text"></small>
            </div>

            <button type="submit">Đăng Ký Ngay</button>
        </form>
    </div>

    <div class="container" id="successBox">
        <div class="badge-success">🎉</div>
        <h1>Đăng ký thành công!</h1>
        <p id="welcomeUser" style="font-size: 18px; color: #555;"></p>
        <button onclick="location.reload()">Quay lại</button>
    </div>
    <script src="Practise2.1.js"></script>
</body>
</html>
