<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Điểm Sinh Viên</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .input-group { margin-bottom: 15px; }
        input { padding: 8px; margin-right: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .bg-yellow { background-color: #fff9c4; } /* Màu cho SV điểm yếu */
        .btn-delete { color: white; background: #ff4444; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .summary { margin-top: 15px; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

    <h2>Quản Lý Điểm Sinh Viên</h2>

    <div class="input-group">
        <input type="text" id="txtName" placeholder="Nhập họ tên...">
        <input type="number" id="txtScore" placeholder="Nhập điểm (0-10)..." step="0.1">
        <button id="btnAdd">Thêm</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentTableBody">
            </tbody>
    </table>

    <div class="summary" id="summaryArea">
        Tổng số SV: 0 | Điểm trung bình lớp: 0
    </div>

    <script src="Practise1.1.js"></script>
</body>
</html>
