<!DOCTYPE html> <html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Lesson</title>
    <link rel="stylesheet" href="stylePractise1.css">
</head>
<body>
    <div class="container">
        <h2>Get in touch with us by filling contact form below</h2>
        <form>
            <div class="form-row">
                <input type="text" placeholder="* Enter your full name" class="flex-1">
                <input type="email" placeholder="* Enter your email" class="flex-1">
            </div>

            <div class="form-row">
                <input type="text" placeholder="Enter your subject" class="flex-full">
            </div>

            <div class="form-row">
                <textarea placeholder="* Your message here..." class="flex-full"></textarea>
            </div>

            <div class="form-footer">
                <button type="submit">Send Message</button>
                <span class="note">* Please fill all required field, thanks!</span>
            </div>
        </form>
    </div>
</body> </html>
